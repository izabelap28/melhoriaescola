<section class="simulador">

<h2>Simulação de Curto Circuito</h2>

<div class="sim-box">

<label>Temperatura do circuito</label>
<input type="range" min="0" max="120" value="30" id="temp">

<span id="tempValor">30°C</span>

<label>Carga elétrica</label>
<input type="range" min="0" max="100" value="20" id="carga">

<span id="cargaValor">20%</span>

<h3>Status: <span id="status">Seguro</span></h3>

<button onclick="verificar()">Verificar Sistema</button>

</div>

</section>

<script src="script.js"></script>
